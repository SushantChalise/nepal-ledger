name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + lint + test + build + secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test --run --passWithNoTests

      - name: Build (Next.js)
        run: pnpm build

      - name: OpenNext build (Cloudflare Workers)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm exec opennextjs-cloudflare build
        env:
          NODE_ENV: production

      - name: Drizzle schema check
        # Drizzle lands in Day 4–6 (schema foundation milestone). Skip until then.
        if: hashFiles('drizzle.config.ts', 'drizzle.config.js', 'drizzle.config.mjs') != ''
        run: pnpm exec drizzle-kit check

      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
